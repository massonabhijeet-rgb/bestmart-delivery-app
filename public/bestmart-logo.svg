<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 52" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Icon background circle -->
  <circle cx="26" cy="26" r="24" fill="url(#iconGrad)"/>

  <!-- Shopping cart icon in white -->
  <g transform="translate(10, 12)" fill="none">
    <!-- Cart body -->
    <path d="M4 2H2" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M4 2L6 12H22L24 6H8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cart wheels -->
    <circle cx="10" cy="16" r="2" fill="white"/>
    <circle cx="20" cy="16" r="2" fill="white"/>
    <!-- Orange accent dot on cart -->
    <circle cx="18" cy="8" r="3" fill="#FF9800"/>
  </g>

  <!-- "best" text -->
  <text x="60" y="33" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="22" fill="url(#textGrad)">best</text>
  <!-- "Mart" text slightly different weight -->
  <text x="106" y="33" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="22" fill="url(#textGrad)">Mart</text>
</svg>
